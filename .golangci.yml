version: "2"

run:
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - prealloc
    - revive
    - unconvert
    - wastedassign
  settings:
    errcheck:
      # Best-effort cleanup, deferred closes, and stderr diagnostics are
      # intentionally unchecked; flagging them is noise, not signal.
      exclude-functions:
        - (*os.File).Close
        - (*compress/gzip.Writer).Close
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (net/http.ResponseWriter).Write
        - os.Remove
        - os.RemoveAll
    staticcheck:
      checks:
        - "all"
        # ST1000 (package-doc comments) is off project-wide: tgc is an
        # application whose packages live under internal/ and are never
        # published to pkg.go.dev, so per-package doc headers have no reader.
        # QF1002 (tagged switch) stays ON — its single hit is silenced with a
        # justified //nolint at internal/ops/media.go:resolveDest instead.
        - "-ST1000"
    revive:
      rules:
        - name: redefines-builtin-id
        - name: unused-parameter
        - name: exported
      # package-comments intentionally omitted — see ST1000 rationale above.
  exclusions:
    rules:
      # Tests use throwaway writers/temp files where checking every error
      # return adds noise without catching real bugs.
      - path: _test\.go
        linters:
          - errcheck
      # gosec perms findings on synthetic test fixtures carry no signal.
      - path: _test\.go
        text: "G301|G306"
        linters:
          - gosec
